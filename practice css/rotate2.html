<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Ball Example</title>
    <style>
        .chakra {
            height: 200px;
            width: 200px;
            background: url(../imgs/sudarshan.jpg);
            background-color: aqua;
            position: relative;
            animation-name: moveChakra;
            animation-duration: 6s;
        }

        @keyframes moveChakra {
            0% {
                background-size: 100px 100px;
                /* height: 100px; */
                /* width: 100px; */
                /*                 */
            }

            10% {
                background-size: 200px 200px;
                /* height: 200px; */
                /* width: 200px; */
            }

            75% {
                background-size: 300px 300px;
                /* height: 300px; */
                /* width: 300px; */
            }

            100% {
                background-size: 100px 100px;
                /* height: 100px; */
                /* width: 100px; */
            }
        }
    </style>
</head>

<body>
    <div class="chakra"></div>
</body>

</html>
